{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Users List</h2>
<a href="{{ url_for('add_user') }}" class="btn btn-success mb-3">Add User</a>
<table class="table table-bordered">
  <tr>
    <th>ID</th><th>Name</th><th>Email</th><th>Password</th><th>Actions</th>
  </tr>
  {% for user in users %}
  <tr>
    <td>{{ user.id }}</td>
    <td>{{ user.Name }}</td>
    <td>{{ user.Email }}</td>
    <td>{{ user.Password }}</td>
    <td>
      <a href="{{ url_for('edit_user', id=user.id) }}" class="btn btn-warning btn-sm">Edit</a>
      <a href="{{ url_for('delete_user', id=user.id) }}" class="btn btn-danger btn-sm">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
